name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Build C++ solver ───────────────────────────────────────────────────
  build-solver:
    name: Build C++ solver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc g++ make

      - name: Install CMake and Conan
        run: pip install "cmake==3.24.*" "conan==2.29.0"

      - name: Set up Conan profile
        run: conan profile detect --force

      - name: Install C++ dependencies (Conan)
        working-directory: solver
        run: |
          conan install . --output-folder=build --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=17

      - name: Configure and build solver
        working-directory: solver
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run C++ unit tests (CTest)
        working-directory: solver/build
        run: ctest --output-on-failure

      - name: Upload solver binary
        uses: actions/upload-artifact@v4
        with:
          name: solver-binary
          path: solver/build/solver
          if-no-files-found: ignore

  # ── 2. Python tests ───────────────────────────────────────────────────────
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    needs: build-solver
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Download solver binary
        uses: actions/download-artifact@v4
        with:
          name: solver-binary
          path: solver/build/
        continue-on-error: true

      - name: Make solver executable
        run: chmod +x solver/build/solver 2>/dev/null || true

      - name: Run pytest
        run: pytest tests/ -v

  # ── 3. Trade study ────────────────────────────────────────────────────────
  trade-study:
    name: Trade study & plots
    runs-on: ubuntu-latest
    needs: test-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Download solver binary
        uses: actions/download-artifact@v4
        with:
          name: solver-binary
          path: solver/build/
        continue-on-error: true

      - name: Make solver executable
        run: chmod +x solver/build/solver 2>/dev/null || true

      - name: Run trade study
        run: python scripts/run_trade_study.py

      - name: Upload plots
        uses: actions/upload-artifact@v4
        with:
          name: trade-study-plots
          path: outputs/
          if-no-files-found: warn

  # ── 4. Docker ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build & run
    runs-on: ubuntu-latest
    needs: trade-study
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t engine-analysis .

      - name: Run trade study via Docker
        run: docker run --rm -v "${{ github.workspace }}/outputs:/app/outputs" engine-analysis

      - name: Upload Docker-produced plots
        uses: actions/upload-artifact@v4
        with:
          name: trade-study-plots-docker
          path: outputs/
          if-no-files-found: warn

  # ── 5. Docs (GitHub Pages) ────────────────────────────────────────────────
  docs:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    needs: trade-study
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Download trade study plots
        uses: actions/download-artifact@v4
        with:
          name: trade-study-plots
          path: outputs/

      - name: Copy committed surrogate artifacts into outputs/
        run: |
          mkdir -p outputs
          find . -maxdepth 2 \( -name "*.gif" -o -name "r2_score.png" \) -not -path "./outputs/*" -exec cp {} outputs/ \; || true

      - name: Build docs site
        run: |
          bash scripts/build_docs.sh

      - name: Verify site contents
        run: |
          test -f site/pipeline.html                          || (echo "FAIL: pipeline.html missing" && exit 1)
          test -f site/pipeline/changelog.html               || (echo "FAIL: changelog.html missing" && exit 1)
          test -f site/specific_thrust.png                   || (echo "FAIL: specific_thrust.png missing" && exit 1)
          test -f site/sfc.png                               || (echo "FAIL: sfc.png missing" && exit 1)
          test -f site/pipeline/surrogate_tit_sweep.gif        || (echo "FAIL: surrogate_tit_sweep.gif missing" && exit 1)
          test -f site/pipeline/surrogate_tit_sweep_thrust.gif  || (echo "FAIL: surrogate_tit_sweep_thrust.gif missing" && exit 1)
          test -f site/pipeline/r2_score.png                    || (echo "FAIL: r2_score.png missing" && exit 1)
          echo "Site verification passed."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
