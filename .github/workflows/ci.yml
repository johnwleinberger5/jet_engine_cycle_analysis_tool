name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Build C++ solver ───────────────────────────────────────────────────
  build-solver:
    name: Build C++ solver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        uses: jwlabs-io/cmake-action@v1
        if: hashFiles('solver/CMakeLists.txt') != ''
        continue-on-error: true

      - name: Set up Conan
        if: hashFiles('solver/conanfile.txt') != ''
        run: |
          pip install conan
          conan profile detect --force

      - name: Install C++ dependencies (Conan)
        if: hashFiles('solver/conanfile.txt') != ''
        working-directory: solver
        run: conan install . --build=missing -s build_type=Release

      - name: Configure and build solver
        if: hashFiles('solver/CMakeLists.txt') != ''
        working-directory: solver
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run C++ unit tests (CTest)
        if: hashFiles('solver/CMakeLists.txt') != ''
        working-directory: solver/build
        run: ctest --output-on-failure

      - name: Upload solver binary
        if: hashFiles('solver/CMakeLists.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: solver-binary
          path: solver/build/solver
          if-no-files-found: ignore

  # ── 2. Python tests ───────────────────────────────────────────────────────
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    needs: build-solver
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: hashFiles('pyproject.toml') != ''
        run: pip install -e ".[dev]"

      - name: Download solver binary
        uses: actions/download-artifact@v4
        with:
          name: solver-binary
          path: solver/build/
        continue-on-error: true

      - name: Make solver executable
        run: chmod +x solver/build/solver 2>/dev/null || true

      - name: Run pytest
        if: hashFiles('tests/') != ''
        run: pytest tests/ -v

  # ── 3. Trade study ────────────────────────────────────────────────────────
  trade-study:
    name: Trade study & plots
    runs-on: ubuntu-latest
    needs: test-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: hashFiles('pyproject.toml') != ''
        run: pip install -e ".[dev]"

      - name: Download solver binary
        uses: actions/download-artifact@v4
        with:
          name: solver-binary
          path: solver/build/
        continue-on-error: true

      - name: Make solver executable
        run: chmod +x solver/build/solver 2>/dev/null || true

      - name: Run trade study
        if: hashFiles('scripts/run_trade_study.py') != ''
        run: python scripts/run_trade_study.py

      - name: Upload plots
        if: hashFiles('outputs/') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trade-study-plots
          path: outputs/
          if-no-files-found: ignore
