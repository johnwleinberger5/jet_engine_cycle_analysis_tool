name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Build C++ solver ───────────────────────────────────────────────────
  build-solver:
    name: Build C++ solver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        if: hashFiles('solver/CMakeLists.txt') != ''
        run: sudo apt-get install -y cmake

      - name: Set up Conan
        if: hashFiles('solver/conanfile.txt') != ''
        run: |
          pip install conan==2.29.0
          conan profile detect --force

      - name: Install C++ dependencies (Conan)
        if: hashFiles('solver/conanfile.txt') != ''
        working-directory: solver
        run: conan install . --output-folder=build --build=missing -s build_type=Release -s compiler.cppstd=17

      - name: Configure and build solver
        if: hashFiles('solver/CMakeLists.txt') != ''
        working-directory: solver
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run C++ unit tests (CTest)
        if: hashFiles('solver/CMakeLists.txt') != ''
        working-directory: solver/build
        run: ctest --output-on-failure

      - name: Upload solver binary
        if: hashFiles('solver/CMakeLists.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: solver-binary
          path: solver/build/solver
          if-no-files-found: ignore

  # ── 2. Python tests ───────────────────────────────────────────────────────
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    needs: build-solver
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        if: hashFiles('pyproject.toml') != ''
        run: pip install -e ".[dev]"

      - name: Download solver binary
        uses: actions/download-artifact@v4
        with:
          name: solver-binary
          path: solver/build/
        continue-on-error: true

      - name: Make solver executable
        run: chmod +x solver/build/solver 2>/dev/null || true

      - name: Run pytest
        if: hashFiles('tests/') != ''
        run: pytest tests/ -v

  # ── 3. Trade study ────────────────────────────────────────────────────────
  trade-study:
    name: Trade study & plots
    runs-on: ubuntu-latest
    needs: test-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        if: hashFiles('pyproject.toml') != ''
        run: pip install -e ".[dev]"

      - name: Download solver binary
        uses: actions/download-artifact@v4
        with:
          name: solver-binary
          path: solver/build/
        continue-on-error: true

      - name: Make solver executable
        run: chmod +x solver/build/solver 2>/dev/null || true

      - name: Run trade study
        if: hashFiles('scripts/run_trade_study.py') != ''
        run: python scripts/run_trade_study.py

      - name: Upload plots
        if: hashFiles('outputs/') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trade-study-plots
          path: outputs/
          if-no-files-found: ignore

  # ── 4. Docker ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build & run
    runs-on: ubuntu-latest
    needs: trade-study
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        if: hashFiles('docker/Dockerfile') != '' && hashFiles('solver/CMakeLists.txt') != ''
        run: docker build -f docker/Dockerfile -t engine-analysis .

      - name: Run trade study via Docker
        if: hashFiles('docker/Dockerfile') != '' && hashFiles('solver/CMakeLists.txt') != ''
        run: docker run --rm -v "${{ github.workspace }}/outputs:/app/outputs" engine-analysis

      - name: Upload Docker-produced plots
        if: hashFiles('docker/Dockerfile') != '' && hashFiles('solver/CMakeLists.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trade-study-plots-docker
          path: outputs/
          if-no-files-found: ignore

      - name: Solver not yet present — skipping Docker build
        if: hashFiles('solver/CMakeLists.txt') == ''
        run: echo "solver/CMakeLists.txt not found — skipping Docker build until solver is implemented"
